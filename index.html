<!doctype html>
<html lang="ja">
<head>

  <style>
    #lf-widget-root {
      --bg-1: #061419;
      --bg-2: #10242d;
      --panel: rgba(243, 234, 214, 0.92);
      --panel-strong: #f0e8d6;
      --ink: #1f2224;
      --muted: #4d5456;
      --accent: #b8462f;
      --accent-2: #0d7f7b;
      --line: #d7cbb2;
      --shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
      margin: 0;
      min-height: 100vh;
      font-family: "Shippori Mincho", "Hiragino Mincho ProN", "Yu Mincho", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 20%, rgba(13, 127, 123, 0.25), transparent 36%),
        radial-gradient(circle at 85% 80%, rgba(184, 70, 47, 0.20), transparent 34%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      line-height: 1.7;
      padding: 24px;
    }

    #lf-widget-root,
    #lf-widget-root * {
      box-sizing: border-box;
    }

    #lf-widget-root .app {
      max-width: 980px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid rgba(239, 227, 201, 0.8);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: rise 0.8s ease;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #lf-widget-root .lfw-header {
      padding: 28px 24px 18px;
      background:
        linear-gradient(120deg, rgba(6, 20, 25, 0.92), rgba(16, 36, 45, 0.92));
      color: #f4ecda;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      position: static !important;
      inset: auto !important;
      transform: none !important;
      z-index: auto !important;
      display: block !important;
    }

    #lf-widget-root .lfw-header h1 {
      margin: 0 0 6px;
      font-size: clamp(1.55rem, 1.05rem + 2vw, 2.2rem);
      letter-spacing: 0.03em;
      font-weight: 700;
    }

    #lf-widget-root .lfw-header p {
      margin: 0;
      color: rgba(244, 236, 218, 0.92);
      font-size: 0.98rem;
    }

    #lf-widget-root .lfw-content {
      padding: 22px;
      position: static !important;
      margin-top: 0 !important;
      display: block !important;
    }

    #lf-widget-root .question {
      padding: 16px;
      margin-bottom: 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.55);
      transform: translateY(6px);
      opacity: 0;
      animation: staggerIn 0.55s ease forwards;
    }

    #lf-widget-root .question:nth-child(1) { animation-delay: 0.03s; }
    #lf-widget-root .question:nth-child(2) { animation-delay: 0.05s; }
    #lf-widget-root .question:nth-child(3) { animation-delay: 0.07s; }
    #lf-widget-root .question:nth-child(4) { animation-delay: 0.09s; }
    #lf-widget-root .question:nth-child(5) { animation-delay: 0.11s; }
    #lf-widget-root .question:nth-child(6) { animation-delay: 0.13s; }
    #lf-widget-root .question:nth-child(7) { animation-delay: 0.15s; }
    #lf-widget-root .question:nth-child(8) { animation-delay: 0.17s; }
    #lf-widget-root .question:nth-child(9) { animation-delay: 0.19s; }
    #lf-widget-root .question:nth-child(10) { animation-delay: 0.21s; }
    #lf-widget-root .question:nth-child(11) { animation-delay: 0.23s; }
    #lf-widget-root .question:nth-child(12) { animation-delay: 0.25s; }

    @keyframes staggerIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #lf-widget-root .q-title {
      margin: 0 0 10px;
      font-size: 1rem;
      font-weight: 700;
    }

    #lf-widget-root .options {
      display: grid;
      gap: 8px;
    }

    #lf-widget-root .option {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 0.96rem;
    }

    #lf-widget-root .option input {
      margin-top: 0.25em;
      accent-color: var(--accent-2);
    }

    #lf-widget-root .optional {
      margin-top: 20px;
      padding: 14px;
      border-radius: 12px;
      border: 1px dashed #b89f78;
      background: rgba(243, 236, 223, 0.7);
    }

    #lf-widget-root .optional h3 {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    #lf-widget-root textarea {
      width: 100%;
      min-height: 86px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #c4b08a;
      font: inherit;
      background: #fff;
    }

    #lf-widget-root .select-wrap {
      margin-top: 10px;
      display: grid;
      gap: 6px;
    }

    #lf-widget-root select {
      max-width: 420px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #c4b08a;
      font: inherit;
      background: #fff;
    }

    #lf-widget-root .actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    #lf-widget-root .button {
      border: 0;
      border-radius: 999px;
      padding: 10px 18px;
      font: inherit;
      cursor: pointer;
      transition: transform 0.16s ease, opacity 0.16s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    #lf-widget-root .button:hover {
      transform: translateY(-1px);
      opacity: 0.92;
    }

    #lf-widget-root .button.primary {
      background: linear-gradient(120deg, #b8462f, #c55f3f);
      color: #fff;
    }

    #lf-widget-root .button.secondary {
      background: #ece2cd;
      color: #2d2f31;
      border: 1px solid #cfbe9f;
    }

    #lf-widget-root .error {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #dc8a79;
      background: #fbe2db;
      color: #7a2516;
      display: none;
      font-size: 0.95rem;
    }

    #lf-widget-root .contact {
      margin: 12px 0 0;
      color: #5c5f60;
      font-size: 0.84rem;
    }

    #lf-widget-root .contact a {
      color: inherit;
    }

    #lf-widget-root .results {
      margin-top: 26px;
      display: none;
      animation: rise 0.65s ease;
    }

    #lf-widget-root .results h2 {
      margin: 0 0 8px;
      font-size: 1.35rem;
    }

    #lf-widget-root .results p.lead {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    #lf-widget-root .section {
      margin-top: 16px;
    }

    #lf-widget-root .section h3 {
      margin: 0 0 8px;
      font-size: 1.05rem;
      color: #112831;
      letter-spacing: 0.02em;
    }

    #lf-widget-root .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 12px;
    }

    #lf-widget-root .card {
      background: var(--panel-strong);
      border: 1px solid #d4c5a9;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
    }

    #lf-widget-root .card h4 {
      margin: 0 0 6px;
      font-size: 1.08rem;
    }

    #lf-widget-root .meta {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    #lf-widget-root .match {
      margin: 0 0 8px;
      padding-left: 1.1em;
      font-size: 0.92rem;
    }

    #lf-widget-root .disclaimer {
      margin-top: 14px;
      color: #5c5f60;
      font-size: 0.84rem;
    }

    @media (max-width: 640px) {
      #lf-widget-root {
        padding: 12px;
      }

      #lf-widget-root .lfw-content {
        padding: 14px;
      }

      #lf-widget-root .question {
        padding: 12px;
      }

      #lf-widget-root .lfw-header {
        padding: 20px 16px 14px;
      }
    }
  </style>
</head>

        <div class="actions">

          <button type="button" class="button secondary" id="resetBtn">回答をリセット</button>
        </div>

        <div class="error" id="errorBox"></div>
        <p class="contact">ツールに関するお問い合わせ: <a href="https://word-tailor.com/" target="_blank" rel="noopener noreferrer">https://word-tailor.com/</a></p>
      </form>

      <section class="results" id="results"></section>
    </div>
  </div>

    function normalize01From5(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return 0.5;
      const clamped = Math.min(5, Math.max(1, n));
      return (clamped - 1) / 4;
    }

    function lengthTo01(lengthLabel) {
      return LENGTH_MAP[lengthLabel] ?? 0.33;
    }

    function preprocessWork(work) {
      const normalizedTypes = {};
      TYPE_KEYS.forEach((type) => {
        const raw = Number(work.types[type] || 0);
        normalizedTypes[type] = Math.max(0, Math.min(1, raw / 3));
      });

      return {
        ...work,
        D: normalize01From5(work.tone.despair),
        U: normalize01From5(work.tone.discomfort),
        A: normalize01From5(work.tone.afterglow),
        R: normalize01From5(work.difficulty),
        S: Math.max(0, Math.min(1, (Number(work.realism) - 1) / 2)),
        L: lengthTo01(work.length),
        typeVector: normalizedTypes
      };
    }

    const WORKS = RAW_WORKS.map(preprocessWork);

    function clamp01(v) {
      return Math.max(0, Math.min(1, v));
    }

    function cosineSimilarity(vectorA, vectorB) {
      let dot = 0;
      let normA = 0;
      let normB = 0;

      TYPE_KEYS.forEach((key) => {
        const a = vectorA[key] || 0;
        const b = vectorB[key] || 0;
        dot += a * b;
        normA += a * a;
        normB += b * b;
      });

      if (!normA || !normB) return 0;
      return dot / (Math.sqrt(normA) * Math.sqrt(normB));
    }

    function weightedMean(pairs) {
      let sum = 0;
      let totalWeight = 0;
      pairs.forEach(([value, weight]) => {
        sum += value * weight;
        totalWeight += weight;
      });
      return totalWeight ? sum / totalWeight : 0;
    }

    function collectAnswers() {
      const answers = {};
      for (let i = 1; i <= 12; i += 1) {
        const input = document.querySelector(`input[name="q${i}"]:checked`);
        if (!input) {
          return { error: `${i}番の質問に回答してください。` };
        }
        answers[`q${i}`] = Number(input.value);
      }

      answers.q13Difficulty = Number(document.getElementById("q13Difficulty").value || 3);
      return { answers };
    }

    function zeroTypeVector() {
      return TYPE_KEYS.reduce((acc, key) => {
        acc[key] = 0;
        return acc;
      }, {});
    }

    function buildUserProfile(answers) {
      const x1 = normalize01From5(answers.q1);
      const x2 = normalize01From5(answers.q2);
      const x3 = normalize01From5(answers.q3);
      const x4 = normalize01From5(answers.q4);
      const x5 = normalize01From5(answers.q5);
      const x6 = Number(answers.q6);
      const x7 = normalize01From5(answers.q7);
      const x8 = normalize01From5(answers.q8);
      const x9 = normalize01From5(answers.q9);
      const x10 = normalize01From5(answers.q10);
      const x11 = normalize01From5(answers.q11);
      const x12 = normalize01From5(answers.q12);
      const xR = normalize01From5(answers.q13Difficulty);

      const typeVector = zeroTypeVector();

      typeVector["宇宙"] = clamp01(x3 + x10 * 0.35 + (x6 === 1 ? 0.1 : 0));
      typeVector["不条理"] = clamp01(x3 * 0.85 + x5 * 0.2);
      typeVector["狂気"] = clamp01(x3 * 0.7 + x9 * 0.2 + x10 * 0.1);
      typeVector["禁術"] = clamp01(x3 * 0.6 + x7 * 0.2 + x9 * 0.35 + (x6 === 3 ? 0.1 : 0));
      typeVector["怪奇現象"] = clamp01(x3 * 0.45 + (1 - x4) * 0.45 + (x6 === 2 ? 0.12 : 0));
      typeVector["異形種族"] = clamp01(x3 * 0.3 + x10 * 0.25 + (x6 === 5 ? 0.15 : 0));
      typeVector["サバイバル"] = clamp01((1 - x3) * 0.45 + (1 - x4) * 0.42 + (x6 === 5 ? 0.18 : 0));
      typeVector["フォークロア"] = clamp01((1 - x3) * 0.35 + x7 * 0.5 + (x6 === 2 ? 0.15 : 0));
      typeVector["異教"] = clamp01(x7 * 0.72 + (x6 === 4 ? 0.15 : 0));
      typeVector["歴史"] = clamp01(x7 * 0.38 + x8 * 0.6 + x9 * 0.3 + x10 * 0.45 + (x6 === 4 ? 0.1 : 0));
      typeVector["幻想"] = clamp01(x5 * 0.8 + x4 * 0.15 + (x6 >= 4 ? 0.1 : 0));
      typeVector["タブー"] = clamp01(x2 * 0.55 + x7 * 0.15 + (x6 === 2 ? 0.08 : 0));

      const targetD = clamp01(x1 * 0.65 + (x12 * 0.6) * 0.35);
      const targetA = clamp01(x1 * 0.4 + x12 * 0.6);

      const profile = {
        x2,
        x4,
        x5,
        x7,
        x8,
        x9,
        x10,
        stageChoice: x6,
        targetD,
        targetU: x2,
        toleranceU: x2,
        targetA,
        targetS: x5,
        targetL: clamp01(x4 * 0.45 + x11 * 0.55),
        toleranceL: x11,
        targetR: xR,
        toleranceR: xR,
        typeVector
      };

      return profile;
    }

    function buildExpectedTags(profile) {
      const tags = new Set(STAGE_TAGS[profile.stageChoice] || []);

      if (profile.x7 >= 0.5) {
        ["古代儀式", "禁忌", "異教", "伝承", "祭儀", "神話"].forEach((tag) => tags.add(tag));
      }
      if (profile.x8 >= 0.5) {
        ["禁書", "秘儀", "真実", "歴史", "記録", "断片"].forEach((tag) => tags.add(tag));
      }
      if (profile.x9 >= 0.5) {
        ["真実", "禁書", "歴史", "調査", "家系"].forEach((tag) => tags.add(tag));
      }
      if (profile.x5 >= 0.5) {
        ["夢", "幻想", "時間"].forEach((tag) => tags.add(tag));
      }
      if (profile.x10 >= 0.6) {
        ["神話", "歴史", "古代文明", "宇宙", "神"].forEach((tag) => tags.add(tag));
      }

      return [...tags];
    }

    function tagMatches(workMotif, expectedTag) {
      return workMotif.includes(expectedTag) || expectedTag.includes(workMotif);
    }

    function scoreTagMatch(work, expectedTags) {
      if (!expectedTags.length) return { score: 0.5, matched: [] };
      const matched = expectedTags.filter((tag) =>
        work.motifs.some((motif) => tagMatches(motif, tag))
      );
      return {
        score: matched.length / expectedTags.length,
        matched
      };
    }

    function calculatePenalty(work, profile) {
      let penalty = 1;

      if (work.U > profile.toleranceU + 0.45) {
        penalty *= 0.15;
      } else if (work.U > profile.toleranceU + 0.25) {
        penalty *= 0.4;
      }

      if (work.L > profile.toleranceL + 0.45) {
        penalty *= 0.2;
      } else if (work.L > profile.toleranceL + 0.25) {
        penalty *= 0.55;
      }

      if (work.R > profile.toleranceR + 0.45) {
        penalty *= 0.4;
      } else if (work.R > profile.toleranceR + 0.25) {
        penalty *= 0.7;
      }

      return penalty;
    }

    function buildReasons(work, profile, matchedTags, typeScore) {
      const reasons = [];

      const diffs = [
        { d: Math.abs(work.A - profile.targetA), text: "余韻の強さが希望に近い" },
        { d: Math.abs(work.D - profile.targetD), text: "読後の重さが狙いと一致" },
        { d: Math.abs(work.S - profile.targetS), text: "現実寄り／幻想寄りのバランスが合う" },
        { d: Math.abs(work.L - profile.targetL), text: "読み切りやすさ（長さ）が合う" },
        { d: Math.abs(work.U - profile.targetU), text: "不快度が許容範囲に収まりやすい" },
        { d: Math.abs(work.R - profile.targetR), text: "文章の難解さが好みに近い" }
      ];

      diffs
        .sort((a, b) => a.d - b.d)
        .slice(0, 2)
        .forEach((item) => reasons.push(item.text));

      if (typeScore >= 0.7) {
        reasons.push("物語タイプ（宇宙・狂気・禁術など）の相性が高い");
      }

      if (!reasons.length) reasons.push("総合スコアで上位一致");
      return reasons.slice(0, 3);
    }

    function evaluateWorks(profile) {
      const expectedTags = buildExpectedTags(profile);

      const scored = WORKS.map((work) => {
        const scoreNum = 1 - weightedMean([
          [Math.abs(work.A - profile.targetA), 0.18],
          [Math.abs(work.D - profile.targetD), 0.12],
          [Math.abs(work.U - profile.targetU), 0.1],
          [Math.abs(work.S - profile.targetS), 0.1],
          [Math.abs(work.L - profile.targetL), 0.12],
          [Math.abs(work.R - profile.targetR), 0.08]
        ]);

        const scoreType = cosineSimilarity(profile.typeVector, work.typeVector);
        const tagResult = scoreTagMatch(work, expectedTags);
        const penalty = calculatePenalty(work, profile);

        const baseScore = clamp01(0.55 * scoreNum + 0.3 * scoreType + 0.15 * tagResult.score);
        const finalScore = clamp01(baseScore * penalty);

        return {
          work,
          scoreNum,
          scoreType,
          scoreTag: tagResult.score,
          matchedTags: tagResult.matched,
          penalty,
          baseScore,
          finalScore,
          reasons: buildReasons(work, profile, tagResult.matched, scoreType)
        };
      });

      scored.sort((a, b) => b.finalScore - a.finalScore);
      return scored;
    }

    function pickAdventure(scored, alreadySelectedTitles, profile, topWork) {
      if (profile.x10 < 0.6) return null;

      const remaining = scored.filter((item) => !alreadySelectedTitles.has(item.work.title));
      const top = topWork || remaining[0];
      if (!remaining.length || !top) return null;

      const candidates = remaining
        .map((item) => {
          const novelty = weightedMean([
            [Math.abs(item.work.S - top.work.S), 0.35],
            [Math.abs(item.work.L - top.work.L), 0.35],
            [Math.abs(item.work.U - top.work.U), 0.3]
          ]);

          const worldPotential = weightedMean([
            [item.work.typeVector["宇宙"], 0.35],
            [item.work.typeVector["歴史"], 0.25],
            [item.work.A, 0.2],
            [item.work.L, 0.2]
          ]);

          return {
            ...item,
            adventureScore: item.finalScore * 0.72 + novelty * 0.18 + worldPotential * 0.1
          };
        })
        .filter((item) => item.finalScore > 0.28)
        .sort((a, b) => b.adventureScore - a.adventureScore);

      return candidates[0] || null;
    }

    function cardHTML(item) {
      const scorePct = Math.round(item.finalScore * 100);

      return `
        <article class="card">
          <h4>${item.work.title}</h4>
          <p class="meta">一致度: ${scorePct}% / ${item.work.length} / 難易度 ${item.work.difficulty}</p>
          <ul class="match">
            ${item.reasons.map((reason) => `<li>${reason}</li>`).join("")}
          </ul>
          <a class="button primary" href="${item.work.url}" target="_blank" rel="noopener noreferrer">購入リンクを見る</a>
        </article>
      `;
    }

    function renderResults(scored, profile) {
      const resultsEl = document.getElementById("results");
      const topPicks = scored.slice(0, 3);
      const runnerUps = scored.slice(3, 5);
      const selected = new Set([...topPicks, ...runnerUps].map((item) => item.work.title));
      const adventure = pickAdventure(scored, selected, profile, topPicks[0]);

      const sections = [];

      sections.push(`
        <div class="section">
          <h3>本命（条件一致が高い3本）</h3>
          <div class="cards">${topPicks.map(cardHTML).join("")}</div>
        </div>
      `);

      sections.push(`
        <div class="section">
          <h3>次点（近いが一部だけ違う2本）</h3>
          <div class="cards">${runnerUps.map(cardHTML).join("")}</div>
        </div>
      `);

      if (adventure) {
        sections.push(`
          <div class="section">
            <h3>冒険枠（新しい方向性の1本）</h3>
            <div class="cards">${cardHTML(adventure)}</div>
          </div>
        `);
      }

      resultsEl.innerHTML = `
        <h2>診断結果</h2>
        <p class="lead">入力した嗜好をもとに、スコア上位を抽出しました。</p>
        ${sections.join("")}
        <p class="disclaimer">※外部リンクは販売ページです。実際の版・収録作品はリンク先でご確認ください。</p>
      `;
      resultsEl.style.display = "block";
      resultsEl.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function renderQuestions() {
      const root = document.getElementById("question-list");
      root.innerHTML = QUESTIONS.map((q) => {
        const optionsHTML = q.options
          .map((text, idx) => {
            const value = idx + 1;
            return `
              <label class="option">
                <input type="radio" name="${q.id}" value="${value}" />
                <span>${text}</span>
              </label>
            `;
          })
          .join("");

        return `
          <fieldset class="question">
            <legend class="q-title">${q.title}</legend>
            <div class="options">${optionsHTML}</div>
          </fieldset>
        `;
      }).join("");
    }

    function showError(message) {
      const box = document.getElementById("errorBox");
      box.textContent = message;
      box.style.display = "block";
    }

    function clearError() {
      const box = document.getElementById("errorBox");
      box.textContent = "";
      box.style.display = "none";
    }

    function attachEvents() {
      const form = document.getElementById("quiz-form");
      const resetBtn = document.getElementById("resetBtn");

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        clearError();

        const { error, answers } = collectAnswers();
        if (error) {
          showError(error);
          return;
        }

        const profile = buildUserProfile(answers);
        const scored = evaluateWorks(profile);
        renderResults(scored, profile);
      });

      resetBtn.addEventListener("click", () => {
        form.reset();
        clearError();
        const resultsEl = document.getElementById("results");
        resultsEl.style.display = "none";
        resultsEl.innerHTML = "";
      });
    }

    renderQuestions();
    attachEvents();
  </script>
</body>
</html>
